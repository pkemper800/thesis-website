name: Deploy Quarto Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Use Node.js 24 for JS-based actions (see GitHub Actions Node 20 deprecation)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install UV
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install system libraries (GIS / GDAL stack)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libgdal-dev libgeos-dev libproj-dev libspatialindex-dev

      - name: Create venv and install Python dependencies
        run: |
          uv venv --python 3.12
          uv pip install -r requirements.txt

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install R packages (for r-analysis.qmd)
        run: |
          Rscript -e "lib <- Sys.getenv('R_LIBS_USER'); stopifnot(nzchar(lib)); dir.create(lib, recursive=TRUE, showWarnings=FALSE); .libPaths(c(lib, .libPaths())); install.packages(c('tidyverse','broom','knitr','rmarkdown'), lib=lib, repos='https://cloud.r-project.org', Ncpus=2, dependencies=TRUE)"

      - name: Render Quarto site
        env:
          QUARTO_PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: quarto render

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
